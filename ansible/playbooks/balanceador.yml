---
- name: Configurar Balanceador
  hosts: localhost
  connection: local
  become: yes
    
  tasks:
    - name: Instalar HAProxy
      ansible.builtin.package:
        name: haproxy
        state: present

    - name: Configurar el reparto de trafico
      ansible.builtin.blockinfile:
        path: /etc/haproxy/haproxy.cfg
        block: |
          frontend http_front
             bind *:80
             default_backend servidores_web

          backend servidores_web
             balance roundrobin
             server hipodromo-a 192.168.1.159:80 check
             server hipodromo-b 192.168.1.161:80 check

    - name: Reiniciar Haproxy para aplicar cambios
      ansible.builtin.service:
        name: haproxy
        state: restarted
        enabled: yes

            
